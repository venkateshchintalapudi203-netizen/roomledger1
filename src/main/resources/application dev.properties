# Server \u2014 Render sets PORT env var automatically
#server.port=${PORT:8080}
server.port=8080

# PostgreSQL \u2014 Render injects DATABASE_URL automatically
#spring.datasource.url=${DATABASE_URL}
spring.datasource.url=jdbc:h2:file:./test-db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# H2 console disabled in prod
spring.h2.console.enabled=false

# JWT \u2014 set JWT_SECRET as env variable on Render dashboard
app.jwt.secret=roomledger_super_secret_jwt_key_2024_change_in_production
app.jwt.expiration=604800000

# CORS \u2014 set your Render frontend URL as env variable on Render dashboard
#app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://10.10.19.73:3000

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.url=/v3/api-docs
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.try-it-out-enabled=true