# Server — Render sets PORT env var automatically
server.port=${PORT:8080}

# PostgreSQL — Render injects DATABASE_URL automatically
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# H2 console disabled in prod
spring.h2.console.enabled=false

# JWT — set JWT_SECRET as env variable on Render dashboard
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=604800000

# CORS — set your Render frontend URL as env variable on Render dashboard
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.url=/v3/api-docs
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.try-it-out-enabled=true
