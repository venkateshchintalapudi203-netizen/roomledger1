services:
  - type: web
    name: roomledger-api
    runtime: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/roomledger-backend-1.0.0.jar
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JWT_SECRET
        generateValue: true        # Render auto-generates a secure random value
      - key: DATABASE_URL
        fromDatabase:
          name: roomledger-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://roomledger-ui.onrender.com   # update after frontend is deployed

databases:
  - name: roomledger-db
    databaseName: roomledger
    user: roomledger